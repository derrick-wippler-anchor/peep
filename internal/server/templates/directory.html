<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Directory listing</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color: #24292e;
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1rem;
}
ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
li {
  padding: 0.25rem 0;
}
a {
  color: #0366d6;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<ul>
{{range .}}<li><a href="{{.Href}}">{{.Name}}</a></li>
{{end}}
</ul>
<script>var es = new EventSource('/__reload'); es.onmessage = function() { location.reload(); };</script>
</body>
</html>
