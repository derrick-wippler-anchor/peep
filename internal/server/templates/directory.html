<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{{.Path}}</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: #24292e;
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1rem;
}
h1 {
  font-size: 1rem;
  font-weight: 600;
  color: #586069;
  margin: 0 0 1rem 0;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid #e1e4e8;
  word-break: break-all;
}
table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid #e1e4e8;
  border-radius: 6px;
  overflow: hidden;
}
tr {
  border-top: 1px solid #e1e4e8;
}
tr:first-child {
  border-top: none;
}
tr:hover {
  background-color: #f6f8fa;
}
td {
  padding: 0.5rem 1rem;
  vertical-align: middle;
}
td.icon {
  width: 2rem;
  padding-right: 0;
  color: #6a737d;
  font-size: 1rem;
}
a {
  color: #0366d6;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<h1>{{.Path}}</h1>
<table>
{{if .ShowParent}}
<tr>
  <td class="icon">&#128193;</td>
  <td><a href="../">../</a></td>
</tr>
{{end}}
{{range .Entries}}
<tr>
  <td class="icon">{{if .IsDir}}&#128193;{{else}}&#128196;{{end}}</td>
  <td><a href="{{.Href}}">{{.Name}}{{if .IsDir}}/{{end}}</a></td>
</tr>
{{end}}
</table>
<script>var es = new EventSource('/__reload'); es.onmessage = function() { location.reload(); };</script>
</body>
</html>
